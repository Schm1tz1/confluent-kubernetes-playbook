apiVersion: v1 
kind: ConfigMap 
metadata:
  name: perftest-config-producer-${KAFKA_TOPIC}
  namespace: confluent
data:
  java-client.properties: | 
    # Required connection configs for Kafka producer, consumer, and admin
    bootstrap.servers=kafka.confluent:9092
    # security.protocol=SSL,SASL_PLAINTEXT
    # sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='...' password='...';
    # sasl.mechanism=PLAIN
  defaults-test.sh: |
    #!/bin/sh
    kafka-producer-perf-test --print-metrics --topic ${KAFKA_TOPIC} --num-records 1000000 --record-size 10000 --throughput 10000000 --command-config /perftest-config-producer/java-client.properties --command-property acks=all
  latency-test.sh: |
    #!/bin/sh
    kafka-producer-perf-test --print-metrics --topic ${KAFKA_TOPIC} --num-records 1000000 --record-size 10000 --throughput 10000000 --command-config /perftest-config-producer/java-client.properties --command-property acks=all batch.size=0 linger.ms=0
  linger-scan.sh: |
    #!/bin/sh

    size_arr=(0 10 100 1000 10000 100000 1000000)

    for size in ${size_arr[@]}; do
      echo $size
      kafka-producer-perf-test --print-metrics --topic ${KAFKA_TOPIC} --num-records 1000000 --record-size 100 --throughput 10000000 --command-config /perftest-config-producer/java-client.properties --command-property acks=all batch.size=$size linger.ms=500
    done
  grid-scan-linger-batch.sh: |
    #!/bin/sh

    extract_latency() {
        echo $1 | tr ',' '\n' | grep 'avg latency' | sed 's/ ms avg latency//g'
    }

    extract_throughput() {
      echo $1 | tr ',' '\n' | grep 'records/sec' | cut -d "(" -f2 | cut -d ")" -f1 | sed 's/ MB\/sec//g'
    }

    batch_size_arr=(0 10 100 1000 10000 100000 1000000)
    linger_ms_arr=(0 10 30 100 300 1000 3000)

    for batch_size in ${batch_size_arr[@]}; do
      for linger_ms in ${linger_ms_arr[@]}; do
          # perf_out=$(kafka-producer-perf-test --topic ${KAFKA_TOPIC} --num-records 1000000 --record-size 100 --throughput 10000000 --command-config /perftest-config-producer/java-client.properties --command-property acks=all linger.ms=$linger_ms batch.size=$batch_size)
          # echo $batch_size $linger_ms $(extract_latency($perf_out)) $(extract_throughput($perf_out))
          echo "$batch_size $linger_ms"
          kafka-producer-perf-test --print-metrics --topic ${KAFKA_TOPIC} --num-records 1000000 --record-size 100 --throughput 10000000 --command-config /perftest-config-producer/java-client.properties --command-property acks=all linger.ms=$linger_ms batch.size=$batch_size
      done
    done
---
apiVersion: batch/v1
kind: Job
metadata:
  name: producer-perf-test-${KAFKA_TOPIC}
  namespace: confluent
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: Never
      # imagePullSecrets:
      # - name: docker-registry-creds
      containers:
      - name: cp-kafka
        image: confluentinc/cp-server:8.2.0
        command: ['sh', '-c', '/perftest-config-producer/defaults-test.sh']
        # command: ['sh', '-c', '/perftest-config-producer/linger-scan.sh']
        # command: ['sh', '-c', '/perftest-config-producer/grid-scan-linger-batch.sh']
        # resources:
        #   limits:
        #     cpu: 200m
        #     memory: 512Mi
        #   requests:
        #     cpu: 10m
        #     memory: 128Mi
        volumeMounts:
        - mountPath: /perftest-config-producer/
          name: perftest-config-producer
          readOnly: true
      volumes:
      - name: perftest-config-producer
        configMap:
          name: perftest-config-producer-${KAFKA_TOPIC}
          defaultMode: 0777
