# ArgoCD Orphan Cleanup - RBAC Resources
#
# Deploy this file directly to your cluster:
#   kubectl apply -f cleanup-hook-rbac.yaml
#
# This creates the ServiceAccount and permissions needed by the PostSync cleanup hook.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-orphan-cleanup
  namespace: argocd
  annotations:
    description: "ServiceAccount for PostSync hook to cleanup orphaned KafkaTopics"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-orphan-cleanup
  annotations:
    description: "Permissions for PostSync hook to read Applications and delete KafkaTopics"
rules:
# Read ArgoCD Applications to get tracked resources
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list"]

# Delete orphaned KafkaTopics
- apiGroups: ["platform.confluent.io"]
  resources: ["kafkatopics"]
  verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-orphan-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-orphan-cleanup
subjects:
- kind: ServiceAccount
  name: argocd-orphan-cleanup
  namespace: argocd
