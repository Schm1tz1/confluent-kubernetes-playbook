# ArgoCD PostSync Cleanup Hook - Automatic Orphan Deletion
#
# This hook automatically deletes KafkaTopic resources that ArgoCD has orphaned
# due to the v3.0+ pruning bug (resources with finalizers + owner references).
#
# DEPLOYMENT:
#   1. Deploy RBAC first: kubectl apply -f cleanup-hook-rbac.yaml
#   2. Add this file to your Git repo (alongside KafkaTopic manifests)
#   3. ArgoCD will run it automatically after each sync
#
# CUSTOMIZATION:
#   - Edit the env variables below to match your setup
#   - Choose a delete policy (see annotations below)
#   - Adjust TTL for log retention
#
# See: https://github.com/anthropics/claude-code for full documentation

apiVersion: batch/v1
kind: Job
metadata:
  # IMPORTANT: Must use fixed 'name' (not 'generateName') when using Kustomize
  # Kustomize doesn't support generateName - it requires static manifests
  name: cleanup-orphaned-topics
  namespace: argocd

  annotations:
    argocd.argoproj.io/hook: PostSync

    # DELETE POLICY - MUST use HookSucceeded with fixed name
    # This ensures the Job is deleted after success, so the next sync can create a new one
    argocd.argoproj.io/hook-delete-policy: HookSucceeded

    # DO NOT use BeforeHookCreation with Kustomize:
    # - Creates race condition: deletion might not finish before creation
    # - Can cause "Job already exists" errors
    # - Hook won't run on subsequent syncs

    # For debugging (keeps logs longer), remove delete policy and rely on TTL:
    # (Comment out the HookSucceeded line above and Jobs will persist for TTL duration)

spec:
  # TTL: How long to keep completed Job before auto-deletion
  # 1800 = 30 minutes, 3600 = 1 hour
  ttlSecondsAfterFinished: 1800

  # Don't retry on failure - investigate and fix instead
  backoffLimit: 0

  template:
    metadata:
      labels:
        app: argocd-orphan-cleanup
    spec:
      serviceAccountName: argocd-orphan-cleanup
      restartPolicy: Never

      containers:
      - name: cleanup-orphans
        # Alpine-based image with kubectl (lightweight ~50MB, POSIX sh)
        # Alternatives: alpine/k8s:1.29.0, bitnami/kubectl:1.30
        image: alpine/k8s:1.28.13
        imagePullPolicy: IfNotPresent

        env:
        # REQUIRED: Customize these for your environment
        - name: APP_NAME
          value: "kafka-topics"        # Your ArgoCD Application name
        - name: APP_NAMESPACE
          value: "argocd"              # ArgoCD namespace (usually "argocd")
        - name: TARGET_NAMESPACE
          value: "confluent"           # Where your KafkaTopics live

        # OPTIONAL: Advanced settings
        - name: RESOURCE_KIND
          value: "KafkaTopic"          # Resource type (don't change)
        - name: DRY_RUN
          value: "false"               # Set to "true" to test without deleting
        - name: LOG_TIMESTAMPS
          value: "true"                # Add timestamps to logs

        command:
        - /bin/sh
        - -c
        - |
          #!/bin/sh
          set -e

          # Logging function with optional timestamps
          log() {
            if [ "$LOG_TIMESTAMPS" = "true" ]; then
              echo "[$(date -u +"%Y-%m-%d %H:%M:%S UTC")] $*"
            else
              echo "$*"
            fi
          }

          log "=================================================="
          log "ArgoCD Orphan Cleanup Hook"
          log "=================================================="
          log "Application: $APP_NAME (namespace: $APP_NAMESPACE)"
          log "Target: $RESOURCE_KIND resources in namespace: $TARGET_NAMESPACE"
          log "Dry Run: $DRY_RUN"
          log ""

          # Install jq if not available (Alpine auto-installs)
          if ! command -v jq >/dev/null 2>&1; then
            log "Installing jq..."
            if ! apk add --no-cache jq >/dev/null 2>&1; then
              log "ERROR: Failed to install jq"
              exit 1
            fi
          fi

          # Wait for ArgoCD to update its status after sync
          # PostSync hook runs immediately, but ArgoCD takes a moment to update .status.resources
          log "Waiting 10 seconds for ArgoCD to update status..."
          sleep 10

          # Get ArgoCD Application status
          log "Fetching ArgoCD Application status..."
          APP_JSON=$(kubectl get application "$APP_NAME" -n "$APP_NAMESPACE" -o json 2>/dev/null || echo "")

          if [ -z "$APP_JSON" ]; then
            log "ERROR: Application $APP_NAME not found in namespace $APP_NAMESPACE"
            exit 1
          fi

          # Extract resources tracked by ArgoCD
          log "Extracting tracked resources..."
          TRACKED=$(echo "$APP_JSON" | jq -r \
            --arg kind "$RESOURCE_KIND" \
            '.status.resources[]? | select(.kind==$kind) | .name' | sort || echo "")

          if [ -z "$TRACKED" ]; then
            log "No $RESOURCE_KIND resources tracked by ArgoCD"
            TRACKED_COUNT=0
          else
            TRACKED_COUNT=$(echo "$TRACKED" | wc -l | tr -d ' ')
            log "ArgoCD is tracking $TRACKED_COUNT $RESOURCE_KIND resource(s):"
            echo "$TRACKED" | sed 's/^/  - /'
          fi
          log ""

          # Get resources in cluster with ArgoCD tracking annotation
          TRACKING_ID_PATTERN="$APP_NAME:"
          log "Fetching $RESOURCE_KIND resources from cluster..."
          ANNOTATED=$(kubectl get kafkatopic -n "$TARGET_NAMESPACE" -o json 2>/dev/null | \
            jq -r --arg pattern "$TRACKING_ID_PATTERN" \
            '.items[]? | select(.metadata.annotations."argocd.argoproj.io/tracking-id"? | contains($pattern)) | .metadata.name' | sort || echo "")

          if [ -z "$ANNOTATED" ]; then
            log "No $RESOURCE_KIND resources found with ArgoCD tracking annotation"
            log "Nothing to clean up"
            exit 0
          fi

          ANNOTATED_COUNT=$(echo "$ANNOTATED" | wc -l | tr -d ' ')
          log "Found $ANNOTATED_COUNT $RESOURCE_KIND resource(s) with ArgoCD tracking annotation:"
          echo "$ANNOTATED" | sed 's/^/  - /'
          log ""

          # Find orphans: resources with tracking annotation but NOT in ArgoCD's tracked list
          if [ -z "$TRACKED" ]; then
            ORPHANS="$ANNOTATED"
          else
            ORPHANS=$(comm -13 <(echo "$TRACKED") <(echo "$ANNOTATED") || echo "")
          fi

          if [ -z "$ORPHANS" ]; then
            log "✅ No orphaned resources found - all annotated resources are tracked by ArgoCD"
            exit 0
          fi

          ORPHAN_COUNT=$(echo "$ORPHANS" | wc -l | tr -d ' ')
          log "=================================================="
          log "⚠️  Found $ORPHAN_COUNT orphaned $RESOURCE_KIND resource(s):"
          log "=================================================="
          echo "$ORPHANS" | sed 's/^/  - /'
          log ""

          if [ "$DRY_RUN" = "true" ]; then
            log "DRY RUN MODE - Would delete the above resources"
            log "Set DRY_RUN=false to actually delete orphans"
            exit 0
          fi

          # Delete orphaned resources
          log "Deleting orphaned resources..."
          DELETED=0
          FAILED=0

          for topic in $ORPHANS; do
            log "Deleting: $topic"

            # Use foreground deletion with timeout to wait for CFK operator finalizer
            # This allows CFK to properly clean up the Kafka topic before CR deletion
            OUTPUT=$(kubectl delete kafkatopic "$topic" -n "$TARGET_NAMESPACE" \
              --cascade=foreground \
              --timeout=60s 2>&1)
            EXIT_CODE=$?

            # Filter reflector noise
            echo "$OUTPUT" | grep -v "reflector.go" | grep -v "Failed to watch" || true

            if [ $EXIT_CODE -eq 0 ]; then
              log "  ✅ Deleted successfully"
              DELETED=$((DELETED + 1))
            elif echo "$OUTPUT" | grep -q "timed out waiting"; then
              log "  ❌ Deletion timed out after 60s - CFK operator not processing finalizer!"
              log "     Check: kubectl logs -n confluent -l app=confluent-operator"
              log "     The topic CR may be stuck - manual intervention required"
              FAILED=$((FAILED + 1))
            elif echo "$OUTPUT" | grep -q "not found"; then
              log "  ✅ Already deleted"
              DELETED=$((DELETED + 1))
            else
              log "  ❌ Failed to delete: $OUTPUT"
              FAILED=$((FAILED + 1))
            fi
          done

          log ""
          log "=================================================="
          log "Cleanup Summary"
          log "=================================================="
          log "Tracked by ArgoCD: $TRACKED_COUNT"
          log "Found in cluster:  $ANNOTATED_COUNT"
          log "Orphans detected:  $ORPHAN_COUNT"
          log "Successfully deleted: $DELETED"
          log "Failed to delete:     $FAILED"
          log "=================================================="

          if [ $FAILED -gt 0 ]; then
            log "⚠️  Some deletions failed - manual intervention may be required"
            exit 1
          fi

          if [ $DELETED -gt 0 ]; then
            log "✅ Cleanup completed - deleted $DELETED orphaned resource(s)"
          else
            log "✅ Cleanup completed - no resources deleted"
          fi
